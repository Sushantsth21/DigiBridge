<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RxDirect Refill Portal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", Tahoma, sans-serif; background: #f5f2ef; color: #2c2a28; }
    .top { background: #7f1f1f; color: #f8dddd; padding: 8px 14px; font-size: 12px; display: flex; justify-content: space-between; }
    .wrap { max-width: 1020px; margin: 16px auto; padding: 0 12px 20px; }
    .hero { background: linear-gradient(135deg, #8d2525, #b13636); color: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 8px 22px rgba(92, 20, 20, 0.27); }
    .hero h1 { font-size: 24px; margin-bottom: 6px; }
    .hero p { color: #ffe3e3; font-size: 13px; }
    .card { background: #fff; border: 1px solid #e9dfdd; border-radius: 12px; box-shadow: 0 4px 14px rgba(72, 30, 30, 0.08); }
    .card h3 { border-bottom: 1px solid #f2e9e7; padding: 11px 14px; font-size: 13px; color: #7f3535; text-transform: uppercase; }
    .body { padding: 14px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .field { margin-bottom: 10px; }
    .field label { display: block; font-size: 12px; margin-bottom: 4px; color: #744848; font-weight: 600; }
    .field input, .field select { width: 100%; border: 1px solid #dccaca; border-radius: 8px; padding: 8px 10px; font-size: 13px; }
    .btn { border: 1px solid transparent; border-radius: 8px; padding: 8px 12px; font-size: 12px; cursor: pointer; font-weight: 700; }
    .btn-main { background: #af2b2b; color: #fff; border-color: #7d1f1f; }
    .actions { display: flex; align-items: center; gap: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { text-align: left; padding: 8px 6px; border-bottom: 1px solid #f1e8e6; }
    th { font-size: 11px; color: #8a6666; text-transform: uppercase; }
    .pill { border-radius: 999px; padding: 3px 8px; font-size: 10px; font-weight: 700; }
    .ok { background: #ddf4e3; color: #21673a; }
    .warn { background: #fff0d7; color: #94641c; }
  </style>
</head>
<body>
  <div class="top">
    <span>RxDirect | Refill Management</span>
    <span>Patient Session: Active</span>
  </div>
  <div class="wrap">
    <section class="hero">
      <h1>Prescription Refills</h1>
      <p>Realtime demo portal for submitting and tracking refill orders.</p>
    </section>

    <section class="card" style="margin-bottom:12px;">
      <h3>Submit Refill Request</h3>
      <div class="body">
        <div class="row">
          <div class="field"><label>Medication</label><input id="medication-input" type="text" placeholder="e.g. lisinopril" /></div>
          <div class="field"><label>Days Supply</label><input id="quantity-input" type="number" min="30" max="90" step="30" placeholder="30 / 60 / 90" /></div>
        </div>
        <div class="field"><label>Delivery</label><select><option>Mail Order</option><option>Retail Pickup</option></select></div>
        <div class="actions">
          <button id="refill-btn" class="btn btn-main" onclick="submitRefill()">Submit Refill</button>
          <span style="font-size:11px;color:#8f6f6f;">Automation IDs: #medication-input #quantity-input #refill-btn</span>
        </div>
      </div>
    </section>

    <section class="card">
      <h3>Recent Refill Orders</h3>
      <div class="body">
        <table>
          <thead><tr><th>Confirmation</th><th>Medication</th><th>Supply</th><th>Status</th><th>ETA</th></tr></thead>
          <tbody id="refill-body"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
