<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Refill Submitted</title>
  <style>
    body { margin: 0; font-family: "Segoe UI", Tahoma, sans-serif; background: #f5f2ef; color: #2e2a28; }
    .header { background: linear-gradient(135deg, #8e2323, #b73a3a); color: #fff; padding: 18px; }
    .wrap { max-width: 840px; margin: 18px auto; padding: 0 12px; }
    .card { background: #fff; border: 1px solid #eadfdd; border-radius: 12px; padding: 14px; }
    .row { display: flex; justify-content: space-between; border-bottom: 1px dashed #eee4e2; padding: 8px 0; font-size: 13px; }
    .row:last-child { border-bottom: none; }
    .l { color: #8a6767; }
    .v { font-weight: 700; color: #5e2323; }
    .btn { display: inline-block; margin-top: 12px; background: #ab2a2a; color: #fff; text-decoration: none; padding: 8px 12px; border-radius: 8px; font-size: 12px; }
  </style>
</head>
<body>
  <header class="header">
    <h1 style="margin:0 0 6px;">Refill Request Submitted</h1>
    <p style="margin:0;">Your refill is in pharmacist review.</p>
  </header>
  <main class="wrap">
    <section class="card">
      <div class="row"><span class="l">Confirmation</span><span class="v" id="conf-num">-</span></div>
      <div class="row"><span class="l">Medication</span><span class="v" id="med-display">-</span></div>
      <div class="row"><span class="l">Days Supply</span><span class="v" id="qty-display">-</span></div>
      <div class="row"><span class="l">Estimated Delivery</span><span class="v" id="delivery-date">-</span></div>
      <div class="row"><span class="l">Submitted At</span><span class="v" id="submitted-time">-</span></div>
      <a class="btn" href="index.html">Return To Portal</a>
    </section>
  </main>
  <script src="app.js"></script>
  <script>window.pharmacyPortalApp.initSuccess();</script>
</body>
</html>
