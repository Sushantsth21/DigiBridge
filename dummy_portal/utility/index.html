<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Utility Bill Pay</title>
</head>
<body>
  <h1>Pay Your Utility Bill</h1>
  <form>
    <label>Account #: <input type="text" name="account" /></label><br />
    <label>Amount: <input type="number" name="amount" step="0.01" /></label><br />
    <button type="submit">Pay Bill</button>
  </form>
</body>
</html>
