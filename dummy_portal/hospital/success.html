<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appointment Submitted</title>
  <style>
    body { margin: 0; font-family: "Segoe UI", Tahoma, sans-serif; background: #edf3f9; color: #203647; }
    .header { background: linear-gradient(135deg, #2c8a4a, #3ea35f); color: #fff; padding: 18px; }
    .wrap { max-width: 840px; margin: 18px auto; padding: 0 12px; }
    .card { background: #fff; border: 1px solid #d8e5ef; border-radius: 12px; padding: 14px; }
    .row { display: flex; justify-content: space-between; border-bottom: 1px dashed #e6eef5; padding: 8px 0; font-size: 13px; }
    .row:last-child { border-bottom: none; }
    .l { color: #607a93; }
    .v { font-weight: 700; color: #1f3f5d; }
    .btn { display: inline-block; margin-top: 12px; background: #2f7eb6; color: #fff; text-decoration: none; padding: 8px 12px; border-radius: 8px; font-size: 12px; }
  </style>
</head>
<body>
  <header class="header">
    <h1 style="margin:0 0 6px;">Appointment Request Submitted</h1>
    <p style="margin:0;">Your request is being reviewed by scheduling.</p>
  </header>
  <main class="wrap">
    <section class="card">
      <div class="row"><span class="l">Confirmation</span><span class="v" id="conf-num">-</span></div>
      <div class="row"><span class="l">Provider</span><span class="v" id="doc-display">-</span></div>
      <div class="row"><span class="l">Preferred Date</span><span class="v" id="date-display">-</span></div>
      <div class="row"><span class="l">Submitted At</span><span class="v" id="submitted-time">-</span></div>
      <a class="btn" href="index.html">Return To Portal</a>
    </section>
  </main>
  <script src="app.js"></script>
  <script>window.hospitalPortalApp.initSuccess();</script>
</body>
</html>
