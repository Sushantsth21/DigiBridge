<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DigiBridge Dummy Success</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 14px;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(135deg, #edf5ff, #e7f7ee);
      color: #1d2f41;
    }

    .card {
      width: min(94vw, 760px);
      border: 1px solid #c8d9ea;
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 10px 26px rgba(19, 50, 76, 0.14);
      overflow: hidden;
    }

    .head {
      background: linear-gradient(90deg, #1f6ca8, #2b9f73);
      color: #e9f8ff;
      padding: 14px;
    }

    .head h1 { font-size: 20px; margin-bottom: 4px; }
    .head p { font-size: 13px; color: #d9f0ff; }

    .body { padding: 14px; display: grid; gap: 12px; }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      background: #eff7ff;
      color: #2b5f8d;
      border: 1px solid #bed4e8;
      border-radius: 999px;
      padding: 5px 10px;
      width: fit-content;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      text-align: left;
      border-bottom: 1px solid #e5edf4;
      padding: 8px 6px;
      vertical-align: top;
    }

    th { width: 180px; color: #4b6882; font-size: 12px; }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    a {
      text-decoration: none;
      border: 1px solid #c1d5e7;
      border-radius: 8px;
      padding: 8px 11px;
      font-size: 12px;
      color: #245f90;
      background: #f2f9ff;
    }

    a.primary {
      color: #fff;
      background: #1d7b53;
      border-color: #145738;
    }
  </style>
</head>
<body>
  <main class="card">
    <header class="head">
      <h1>Request Completed</h1>
      <p>This is a shared success screen for all unified dummy portal flows.</p>
    </header>

    <section class="body">
      <span class="badge" id="flow-type">FLOW</span>
      <table>
        <tbody id="details"></tbody>
      </table>

      <div class="actions">
        <a class="primary" href="/">Back to Unified Portal</a>
        <a href="/hospital/">Legacy Hospital</a>
        <a href="/pharmacy/">Legacy Pharmacy</a>
        <a href="/utility/">Legacy Utility</a>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const p = new URLSearchParams(window.location.search);
      const type = (p.get("type") || "request").toUpperCase();
      document.getElementById("flow-type").textContent = type;

      const entries = [];
      p.forEach((value, key) => {
        entries.push([key, value]);
      });

      if (!entries.length) {
        entries.push(["status", "No query parameters found"]);
      }

      const tbody = document.getElementById("details");
      tbody.innerHTML = entries.map(([k, v]) => `<tr><th>${k}</th><td>${v}</td></tr>`).join("");
    })();
  </script>
</body>
</html>
